<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page Title -->
    <title>Lab 4</title>
    <!-- Mapbox GL JS API -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css' rel='stylesheet' />
    <!-- Turf.js API -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <!-- CSS Reference -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Map -->
    <div id="main-map1" class="main-map1">
        <div id="campus-legend" class="legend">
            <h4 class="legendtitle">Collisions in the City of Toronto, ON</h4>
            <div><span class="hex"></span><p class="legendtext">Hexagons (0.5km spans)</p></div>
            <div><span class="pedestrianpoints"></span><p class="legendtext">Pedestrian Collisions</p></div>
            <div><span class="cyclistpoints"></span><p class="legendtext">Cyclist Collisions</p></div>
        </div>
        <button class="hexagonbutton" id="hexagonbuttonJS">Hexagon</button>
        <button class="pointbutton" id="pointbuttonJS">Point</button>
    </div>
    <!-- Script Connection -->
    <script src="script.js"></script>
</body>

</html>
